  <!-- First-run setup gate: the server locks the API (401 + setupRequired)
       until a password exists. This wrapper watches every API response for
       that signal; when it trips, the SPA is held on a one-time
       create-password screen (all API calls freeze) and the page reloads
       into the normal flow once the password — and its session — exists.
       The server remains the real gate; this is only the walkthrough. -->
  <script>
  (function () {
    var realFetch = window.fetch;
    var setupMode = false;

    function showSetup() {
      if (document.getElementById('qb-setup')) return;
      var overlay = document.createElement('div');
      overlay.id = 'qb-setup';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:var(--bg,#f4f5f7);padding:20px';
      var card = document.createElement('form');
      card.className = 'login-card';
      card.autocomplete = 'off';
      card.innerHTML =
        '<div class="logo" style="justify-content:center;padding:0 0 6px">' +
          '<span class="logo-mark">Q</span>' +
          '<span class="logo-text" style="color:var(--ink)">QuickBucks</span></div>' +
        '<p class="bank-help" style="margin:0 0 10px">Welcome to QuickBucks. The app is locked by ' +
          'default — create the password that protects these books. You will need it to log in ' +
          'from now on (and so will anyone else on the network).</p>' +
        '<label class="field"><span>New password (at least 6 characters)</span>' +
          '<input type="password" id="qb-setup-pw" autocomplete="new-password" autofocus></label>' +
        '<label class="field"><span>Confirm password</span>' +
          '<input type="password" id="qb-setup-pw2" autocomplete="new-password"></label>' +
        '<div class="login-error" id="qb-setup-error" hidden></div>' +
        '<button class="btn btn-primary" type="submit" style="width:100%">Create password &amp; start</button>';
      overlay.appendChild(card);
      document.body.appendChild(overlay);
      card.addEventListener('submit', function (e) {
        e.preventDefault();
        var err = document.getElementById('qb-setup-error');
        err.hidden = true;
        var next = document.getElementById('qb-setup-pw').value;
        if (next !== document.getElementById('qb-setup-pw2').value) {
          err.textContent = 'Passwords do not match';
          err.hidden = false;
          return;
        }
        // Bypass the wrapper (it holds /api calls in setup mode): the server
        // sets a session cookie on success, so a reload lands logged in.
        realFetch('/api/password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ next: next })
        }).then(function (res) {
          return res.json().then(function (d) {
            if (!res.ok) throw new Error(d.error || 'Setup failed');
            location.reload();
          });
        }).catch(function (e2) {
          err.textContent = e2.message;
          err.hidden = false;
        });
      });
      var pw = document.getElementById('qb-setup-pw');
      if (pw) pw.focus();
    }

    window.fetch = function (url, opts) {
      var u = String(url);
      if (setupMode && u.indexOf('/api/') === 0) {
        return new Promise(function () {});   // hold the SPA until reload
      }
      return realFetch.apply(this, arguments).then(function (res) {
        if (setupMode) return res;
        var ct = res.headers.get('content-type') || '';
        var watched = u.indexOf('/api/auth-status') !== -1 || (u.indexOf('/api/') !== -1 && res.status === 401);
        if (watched && ct.indexOf('application/json') !== -1) {
          return res.clone().json().then(function (d) {
            if (d && d.setupRequired) {
              setupMode = true;
              showSetup();
            }
            return res;
          }, function () { return res; });
        }
        return res;
      });
    };
  })();
  </script>
