<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font: 13px/1.5 system-ui, sans-serif; width: 260px; margin: 0; padding: 12px 14px; }
  h1 { font: 700 15px Georgia, serif; margin: 0 0 2px; }
  .tag { font-style: italic; color: #777; font-size: 11px; margin-bottom: 10px; }
  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
          color: #666; margin-top: 8px; }
  input[type=text], input[type=number] { width: 100%; box-sizing: border-box; padding: 4px 6px;
          border: 1px solid #ccc; border-radius: 5px; font: inherit; }
  .row { display: flex; align-items: center; gap: 6px; margin-top: 10px; }
  #status { margin-top: 10px; font-size: 12px; }
  .ok { color: #166534; } .bad { color: #b45309; }
  .note { color: #888; font-size: 11px; margin-top: 8px; }
</style>
</head>
<body>
  <h1>Matterproof</h1>
  <div class="tag">proof of work for every matter</div>

  <div class="row">
    <input type="checkbox" id="enabled">
    <label for="enabled" style="margin:0; text-transform:none; font-size:13px; color:inherit;">Capture Claude chat activity</label>
  </div>

  <label>Bill to client</label>
  <input type="text" id="client" placeholder="(default client)">

  <label>Matter</label>
  <input type="text" id="matter" placeholder="(defaults to client)">

  <label>Matterproof port</label>
  <input type="number" id="port" value="4321">

  <div id="status">Checking connection…</div>
  <div class="note">Events go only to 127.0.0.1 on this machine. Start the ledger with <code>billable serve</code>.</div>
<script src="popup.js"></script>
</body>
</html>
